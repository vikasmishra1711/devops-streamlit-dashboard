---
- name: Install Docker on Amazon Linux 2023
  hosts: webserver
  become: yes

  tasks:

    - name: Update packages
      dnf:
        name: "*"
        state: latest

    - name: Install Docker
      dnf:
        name: docker
        state: present

    - name: Start Docker Service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Restart Docker
      service:
        name: docker
        state: restarted